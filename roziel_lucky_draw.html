<!DOCTYPE html>
<html>
<head>

</head>
<body>
    <h1> Lucky Draw </h1>

    <input type="text" id="name" placeholder="Input Name Here" required><br>
    <p id="msg-name"></p>

    <input type="number" id="guess" placeholder="guess a random number 1-5" min="1" max="5" required>
    <p id="msg-guess"></p>
    
    <button onclick="guess()">Click to win</button>
    <p id="result"></p>
    <p id="timer"></p>

    <script>
    var seconds= 0;
    setInterval(function() {
        seconds = seconds + 1;
        document.getElementById("timer").textContent = "You have been in this webpage for " + seconds + " seconds."
    },1000);

    function guess() {
        var name = document.getElementById("name").value;
        var guess = document.getElementById("guess").value;
        var ok = true;

        if (name == "") {
            document.getElementById("msg-name").textContent = "Please enter your name!";
            document.getElementById("msg-name").style.color = "red";
            ok = false;
        }
        else {
            document.getElementById("msg-name").textContent = "Good to go";
            document.getElementById("msg-name").style.color = "green";
        }
        if (guess == ""){
        document.getElementById("msg-guess").textContent = "Enter a number above!";
        document.getElementById("msg-guess").style.color = "red";
        ok = false;
    }else {
        document.getElementById("msg-guess").textContent = "Valid number saved";
        document.getElementById("msg-guess").style.color = "green";
    }
    if (ok == true){
        var lucky= Math.floor(Math.random() * 5) + 1;
        if (guess == lucky) {
            document.getElementById("result").textContent = "You win " + name + ", The correct number was " + lucky;
            document.getElementById("result").style.color = "green";
        }
        else {
            document.getElementById("result").textContent = "Sorry " + name + ", the correct number was " + lucky;
            document.getElementById("result").style.color = "red";
        }
    }
    }
    </script>
</body>
</html>
