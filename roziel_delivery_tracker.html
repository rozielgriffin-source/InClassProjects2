<!DOCTYPE html>
<html>
    <head>
        <title> My delivery tracker</title>
        <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: yellow;
            padding: 20px;
            text-align: center;
        }
        h1{
            color: darkgreen;

        }
        button{
            background-color: black;
            color: yellow;
        }
        div{
            border: 3px solid black;
            width: auto;
            margin: 10px;
        }
        </style>
    </head>
    <body>
        <h1> Roziel's Delivery Tracker</h1>

        <button onclick="saveorder()">Save Order</button>
        <button onclick="deliver()">Start Delivery</button>

        <div> json-text: <span id="text"></span></div>
        <div> Loaded Item: <span id="item"></span></div>
        <div> Loaded Item Price: <span id="price"></span></div>
        <div> Status For Delivery: <span id="status"></span></div>
        <div> Result: <span id="result"></span></div>

        <script>

            let order ={
                item : "Nachos",
                price : 16,
                shop : "McRoziels"
            };

            function saveorder(){
                let jsonText = JSON.stringify(order);
                let loadedOrder = JSON.parse(jsonText);

                document.getElementById("text").innerHTML= jsonText;
                document.getElementById("item").innerHTML= loadedOrder.item;
                document.getElementById("price").innerHTML= "$" + loadedOrder.price
            };

            function delay(ms) {
                return new Promise(function(resolve){
                    setTimeout(resolve, ms)
                });
            }

            async function deliver() {
                document.getElementById("result").innerHTML = "";

                document.getElementById("status").innerHTML = "Order recieved...";

                setTimeout(function(){
                    document.getElementById("status").innerHTML = "The kitchen is now preparing your order..."
                },1000)

                await delay(2000);
                document.getElementById("status").innerHTML = "Out For Delivery!"

                await delay(3000);
                document.getElementById("result").innerHTML = "Your order has arrived!"
            }

        </script>
    </body>
</html>
